name: CI

on: pull_request:
    branches:[main]

jobs:
  build:
    name: lint code base
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: Run super-linter
        uses: github/super-linter@v6

      - run : npm ci 
      - run : npm run lint
      - run : npm test
